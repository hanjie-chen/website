name: CI

on:
  push:
    branches:
      - main # 仅 main 分支 push 触发
  pull_request:
    branches:
      - main # 针对 main 分支的 pull request 触发

# GHCR push 需要 packages: write。
# 说明：这里使用 GitHub 自动注入的 GITHUB_TOKEN，不需要手动创建 token。
permissions:
  contents: read
  packages: write

jobs:
  compose-check-and-build:
    runs-on: ubuntu-latest # 使用最近的 ubuntu image
    steps:
      # 拉取代码
      - name: Checkout
        uses: actions/checkout@v6
      # 检查 compose.yml 语法
      - name: Validate compose (prod)
        run: docker compose -f compose.yml config

      - name: Validate compose (dev overlay)
        run: docker compose -f compose.yml -f compose.dev.yml config

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: shellcheck -x scripts/deploy/*.sh articles-sync/*.sh

      # 跑 web-app tests.
      - name: Build web-app (test)
        run: docker compose -f compose.yml -f compose.dev.yml build web-app

      - name: Run ruff
        run: docker compose -f compose.yml -f compose.dev.yml run --rm --no-deps -T web-app ruff check .

      - name: Run format check
        run: docker compose -f compose.yml -f compose.dev.yml run --rm --no-deps -T web-app ruff format --check .

      # Security advisory step (non-blocking for now):
      # - scan locked Python dependencies from requirements.txt
      # - use official PyPA action
      - name: Set up Python for pip-audit
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run pip-audit (advisory, official action)
        continue-on-error: true
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: web-app/requirements.txt
          no-deps: true

      - name: Run pytest with coverage gate
        run: >
          docker compose -f compose.yml -f compose.dev.yml run --rm --no-deps -T web-app
          pytest -q
          --cov=app
          --cov=import_articles_scripts
          --cov=markdown_render_scripts
          --cov=models
          --cov-report=term-missing
          --cov-fail-under=30

      # GHCR（ghcr.io）集成：
      # - 仅在 push 事件执行（PR 只做检查，不推镜像）
      # - 镜像命名：ghcr.io/<owner>/<repo>-<service>:<tag>
      - name: Set up Docker Buildx
        if: github.event_name == 'push'
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web-app image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./web-app
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/website-web-app:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/website-web-app:latest

      - name: Build and push articles-sync image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v7
        with:
          context: ./articles-sync
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/website-articles-sync:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/website-articles-sync:latest
