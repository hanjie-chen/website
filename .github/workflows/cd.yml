name: CD

on:
  workflow_run:
    workflows: ["CI"] # 监控名为 "CI" 的工作流
    types: [completed] # 当它运行结束时
    branches: [main] # 且必须是在 main 分支上结束

# 防止多次 push 导致的 ci/cd 冲突
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    # ci 成功之后才部署
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/plain/projects/website
            git fetch --all --prune
            git checkout main
            git pull --ff-only origin main
            DEPLOY_SHA="${{ github.event.workflow_run.head_sha }}"
            ./scripts/deploy/prod_deploy.sh "${DEPLOY_SHA}"
            ./scripts/deploy/ensure_db_ready.sh "${DEPLOY_SHA}"
            ./scripts/deploy/wait_services_healthy.sh web-app nginx-modsecurity
            ./scripts/deploy/smoke_check.sh
