apiVersion: v1
kind: Service
metadata:
  name: website-web-app
  namespace: k8s-lab
spec:
  # This must match the Pod labels from the Deployment template.
  selector:
    app: website-web-app
  ports:
    - name: http
      # The port exposed by the Service itself.
      port: 80
      # The container port on the target Pod.
      targetPort: 5000
  # Expose the Service through a port on the local k3s node.
  type: NodePort
