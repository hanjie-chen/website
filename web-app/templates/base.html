<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    {% block title %}

    {% endblock%}

    <!-- 网站图标 -->
    <link rel="icon" href="{{ asset_url('icon/favicon_point.ico') }}" type="image/x-icon">


    <!--engage Bootstrap 5 CSS -->
    <link rel="stylesheet" href="{{ asset_url('bootstrap5/css/bootstrap.min.css') }}">
    <!-- preload the lightweight Chinese UI subset so fixed labels can settle earlier -->
    <link rel="preload" href="{{ asset_url('font/PingFangSC/PingFang-SC-UI-subset.woff2') }}" as="font"
        type="font/woff2" crossorigin>
    <!-- use the pointed font -->
    <link rel="stylesheet" href="{{ asset_url('font/font.css') }}">
    <!-- pointed body color -->
    <link rel="stylesheet" href="{{ asset_url('css/style.css') }}">
    <link rel="stylesheet" href="{{ asset_url('css/docs-shell.css') }}">
    <!-- engage articles index page card -->
    <link rel="stylesheet" href="{{ asset_url('css/card.css') }}">
    <link rel="stylesheet" href="{{ asset_url('css/article-details.css') }}">
    <!-- engage bockquote style -->
    <link rel="stylesheet" href="{{ asset_url('css/blockquote.css') }}">
    <!-- engage title style -->
    <link rel="stylesheet" href="{{ asset_url('css/title.css') }}">
    <!-- engage emoji style -->
    <link rel="stylesheet" href="{{ asset_url('css/emoji.css') }}">

    <!-- engage markdown related css -->
    <!-- md code style which generated by pygments -->
    <link rel="stylesheet" href="{{ asset_url('css/md-css/pygment-style.css') }}">
    <!-- md code custom style -->
    <link rel="stylesheet" href="{{ asset_url('css/md-css/md-code-custom.css') }}">
    <!-- md admonition style -->
    <link rel="stylesheet" href="{{ asset_url('css/md-css/gfm-admonition.css') }}">
    {% block extra_styles %}

    {% endblock %}

</head>

<body>
    <main class="d-flex flex-column min-vh-100">
        <!-- Navbar -->
        {% block navbar%}

        {% endblock %}

        <!-- Main Content -->
        {% block main_content%}

        {% endblock %}

        <!-- Footer -->
        <footer class="footer-custom py-3">
            <div class="container text-center">
                <span>&copy; 2026 for hanjie site</span>
            </div>
        </footer>

    </main>
    <!-- Bootstrap 5 JS Bundle with Popper -->
    <script src="{{ asset_url('bootstrap5/js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ asset_url('code-copy.js') }}"></script>
    <script src="{{ asset_url('article-toc.js') }}"></script>
    {% block script %}

    {% endblock %}
</body>

</html>
